name: Smart Suggestions
version: "3.1.1"
slug: smart_suggestions
description: AI-powered contextual home automation suggestions using local Ollama
url: https://github.com/64bitjoe/smart-suggestions-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:lightbulb-on-outline"
panel_title: "Smart Suggestions"
homeassistant_api: true
auth_api: true
map:
  - config:ro
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  ollama_url: "http://homeassistant.local:11434"
  ollama_model: "qwen3:8b"
  refresh_interval: 10
  max_suggestions: 7
  max_entities: 150
  history_hours: 4
  narrator_provider: "ai"
  ai_provider: "anthropic"
  ai_api_key: ""
  ai_base_url: ""
  ai_model: "claude-haiku-4-5-20251001"
  mining_history_days: 30
  mining_interval_hours: 1
  waste_check_interval_minutes: 5
  min_pattern_occurrences: 5
  min_pattern_confidence: 0.7
  domains:
    - light
    - switch
    - climate
    - lock
    - media_player
    - cover
    - fan
    - vacuum
    - automation
    - script
    - input_boolean
schema:
  ha_url: str
  ha_token: password?
  ollama_url: str
  ollama_model: str
  refresh_interval: int
  max_suggestions: int
  max_entities: int
  history_hours: int
  narrator_provider: str
  ai_provider: str
  ai_api_key: password?
  ai_base_url: str?
  ai_model: str?
  mining_history_days: int
  mining_interval_hours: int
  waste_check_interval_minutes: int
  min_pattern_occurrences: int
  min_pattern_confidence: float
  domains:
    - str
# image: ghcr.io/64bitjoe/smart-suggestions-addon/{arch}
# Uncomment the image line above once GitHub Actions builds are set up.
# Until then, Supervisor builds locally from the Dockerfile.
