name: Smart Suggestions
version: "4.0.1"
slug: smart_suggestions
description: Learns your habits from HA history and offers one-tap actions, automations, and waste alerts
url: https://github.com/64bitjoe/smart-suggestions-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:lightbulb-on-outline"
panel_title: "Smart Suggestions"
homeassistant_api: true
auth_api: true
map:
  - config:rw
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  ai_api_key: ""
  ai_model: "claude-haiku-4-5-20251001"
  secondary_base_url: ""
  secondary_model: ""
  describe_backend: "primary"
  mining_interval_hours: 1
  waste_check_interval_minutes: 5
  history_days: 30
  max_now_suggestions: 5
  domains:
    - light
    - switch
    - climate
    - lock
    - media_player
    - cover
    - fan
    - vacuum
    - input_boolean
schema:
  ha_url: str
  ha_token: password?
  ai_api_key: password?
  ai_model: str?
  secondary_base_url: str?
  secondary_model: str?
  describe_backend: list(primary|secondary)?
  mining_interval_hours: int
  waste_check_interval_minutes: int
  history_days: int
  max_now_suggestions: int
  domains:
    - str
