name: Smart Suggestions
version: "1.0.12"
slug: smart_suggestions
description: AI-powered contextual home automation suggestions using local Ollama
url: https://github.com/64bitjoe/smart-suggestions-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
auth_api: true
map:
  - config:ro
options:
  ollama_url: "http://homeassistant.local:11434"
  ollama_model: "llama3:latest"
  refresh_interval: 10
  max_suggestions: 7
  history_hours: 4
schema:
  ollama_url: str
  ollama_model: str
  refresh_interval: int
  max_suggestions: int
  history_hours: int
# image: ghcr.io/64bitjoe/smart-suggestions-addon/{arch}
# Uncomment the image line above once GitHub Actions builds are set up.
# Until then, Supervisor builds locally from the Dockerfile.
