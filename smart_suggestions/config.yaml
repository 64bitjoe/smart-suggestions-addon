name: Smart Suggestions
version: "2.0.15"
slug: smart_suggestions
description: AI-powered contextual home automation suggestions using local Ollama
url: https://github.com/64bitjoe/smart-suggestions-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
auth_api: true
map:
  - config:ro
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  ollama_url: "http://homeassistant.local:11434"
  ollama_model: "llama3:latest"
  refresh_interval: 10
  max_suggestions: 7
  history_hours: 4
  analysis_depth_days: 7
  analysis_schedule: "03:00"
  analysis_interval_hours: 6
  ai_provider: "anthropic"
  ai_api_key: ""
  ai_base_url: ""
  ai_model: "claude-opus-4-6"
  correlation_window_minutes: 5
  pattern_confidence_threshold: 0.6
schema:
  ha_url: str
  ha_token: password?
  ollama_url: str
  ollama_model: str
  refresh_interval: int
  max_suggestions: int
  history_hours: int
  analysis_depth_days: int
  analysis_schedule: str
  analysis_interval_hours: int
  ai_provider: str
  ai_api_key: password?
  ai_base_url: str?
  ai_model: str?
  correlation_window_minutes: int
  pattern_confidence_threshold: float
# image: ghcr.io/64bitjoe/smart-suggestions-addon/{arch}
# Uncomment the image line above once GitHub Actions builds are set up.
# Until then, Supervisor builds locally from the Dockerfile.
